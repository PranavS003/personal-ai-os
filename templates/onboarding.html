<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Setup | Personal AI OS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-fade">
    <div class="page-shell onboarding-shell">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>

        <main class="onboarding-page">
            <section class="onboarding-card">
                <div class="onboarding-copy">
                    <p class="eyebrow">Personal AI OS</p>
                    <h1>Good Morning &#128075;</h1>
                    <p class="hero-text">Let&apos;s plan your day</p>
                    {% if day_notice %}
                        <p class="hero-text day-notice">{{ day_notice }}</p>
                    {% endif %}
                </div>

                <form id="dailySetupForm" class="daily-setup-form">
                    <div class="setup-group">
                        <label for="dailyTaskInput">What are your main tasks today?</label>
                        <div class="input-row">
                            <input type="text" id="dailyTaskInput" placeholder="Add a task for today">
                            <button type="button" id="addDailyTask">Add task</button>
                        </div>
                        <div id="dailyTaskList" class="setup-task-list" aria-live="polite"></div>
                    </div>

                    <div class="setup-group">
                        <label for="sleepHours">Hours slept</label>
                        <input type="number" id="sleepHours" min="0" max="24" step="0.5" placeholder="How many hours did you sleep?">
                    </div>

                    <div class="setup-group">
                        <span class="setup-label">Mood</span>
                        <div class="choice-row" data-choice-group="mood">
                            <button type="button" class="choice-button" data-value="Happy">Happy &#128522;</button>
                            <button type="button" class="choice-button" data-value="Normal">Normal &#128528;</button>
                            <button type="button" class="choice-button" data-value="Stressed">Stressed &#128531;</button>
                        </div>
                    </div>

                    <div class="setup-group">
                        <span class="setup-label">Exercise</span>
                        <div class="choice-row" data-choice-group="exercise">
                            <button type="button" class="choice-button" data-value="yes">Yes</button>
                            <button type="button" class="choice-button" data-value="no">No</button>
                        </div>
                    </div>

                    <p id="setupFeedback" class="setup-feedback" aria-live="polite"></p>

                    <button type="submit" id="startDayButton" class="start-day-button">Start My Day</button>
                </form>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/onboarding.js') }}"></script>
</body>
</html>
