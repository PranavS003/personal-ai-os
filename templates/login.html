<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Personal AI OS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-fade">
    <div class="page-shell auth-shell">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>

        <main class="auth-page">
            <section class="auth-card">
                <div class="auth-copy">
                    <p class="eyebrow">Personal AI OS</p>
                    <h1>Welcome to Personal AI OS</h1>
                    <p class="hero-text">Login to continue</p>
                </div>

                <form method="post" action="{{ url_for('login') }}" class="daily-setup-form">
                    <div class="setup-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required>
                    </div>

                    <div class="setup-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>

                    {% if error %}
                        <p class="setup-feedback error">{{ error }}</p>
                    {% endif %}

                    <button type="submit" class="start-day-button">Login</button>
                    <p class="auth-hint">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
